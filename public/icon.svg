<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Dumbbell -->
  <g transform="translate(256,256)">
    <!-- Left weight plates -->
    <rect x="-148" y="-40" width="36" height="80" rx="8" fill="white"/>
    <rect x="-128" y="-48" width="16" height="96" rx="6" fill="white"/>
    <!-- Right weight plates -->
    <rect x="112" y="-40" width="36" height="80" rx="8" fill="white"/>
    <rect x="112" y="-48" width="16" height="96" rx="6" fill="white"/>
    <!-- Bar -->
    <rect x="-112" y="-16" width="224" height="32" rx="6" fill="white"/>
    <!-- Inner weight plates (adjustable) -->
    <rect x="-112" y="-36" width="14" height="72" rx="5" fill="rgba(255,255,255,0.85)"/>
    <rect x="98" y="-36" width="14" height="72" rx="5" fill="rgba(255,255,255,0.85)"/>
  </g>
</svg>
